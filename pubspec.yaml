name: giggle
description: "Task Management App"
version: 0.0.1+1

environment:
  sdk: ^3.8.1

dependencies:
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.0
  equatable: ^2.0.7
  injector: ^4.0.0
  json_annotation: ^4.9.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  easy_localization: ^3.0.7
  connectivity_plus: ^7.0.0
  go_router: ^16.3.0
  fimber: ^0.7.0
  flutter_dotenv: ^6.0.0
  passkeys: ^2.16.0
  plugin_wifi_connect: ^2.0.1

  apiClient:
    path: packages/api_client

  storage:
    path: packages/storage

dev_dependencies:
  build_runner: ^2.4.8
  flutter_lints: ^2.0.1
  json_serializable: ^6.7.1
  lints: ^2.0.1
  very_good_analysis: ^3.1.0
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/images/
    - assets/translations/